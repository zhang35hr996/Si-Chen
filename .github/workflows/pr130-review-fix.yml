name: Apply PR130 review fixes

on:
  push:
    branches:
      - worktree-companion-history-pr4c1
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: worktree-companion-history-pr4c1
          fetch-depth: 0

      - name: Apply reviewer fixes and regression tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f"expected snippet not found in {path}")
              p.write_text(text.replace(old, new, 1))

          # 1) stale-plan safety, sequence collision defense, canonical time sorting.
          replace_once(
              "src/engine/characters/companionReconciliation.ts",
              '''export function companionAssignmentId(heirId: string, seq: number): string {
            return `companion_assignment_${heirId}_${seq}`;
          }
          ''',
              '''export function companionAssignmentId(heirId: string, seq: number): string {
            return `companion_assignment_${heirId}_${seq}`;
          }

          /** 正式 assignment id 的全局数字序列；legacy id 不参与。 */
          function companionAssignmentSequence(id: string): number | null {
            const match = /^companion_assignment_.+_(\\d+)$/.exec(id);
            return match ? Number(match[1]) : null;
          }
          ''',
          )

          replace_once(
              "src/engine/characters/companionReconciliation.ts",
              '''  // 3) 写入替补/新择定：槽位已被同一人物占据则视作已应用，跳过（幂等）。
            for (const draft of plan.newAssignments) {
              const existing = active[draft.heirId];
              if (existing && existing.companion.personId === draft.companion.personId) continue;
              const id = companionAssignmentId(draft.heirId, seq);
              seq += 1;
              active[draft.heirId] = { ...draft, id };
            }
          ''',
              '''  // 3) 写入替补/新择定。planner 只为无 active 的槽位生成草案；若槽位已有任何
            // 较新关系，说明 plan 已过期，必须跳过，绝不能无历史地覆盖现任伴读。
            const usedAssignmentIds = new Set([
              ...Object.values(active).map((a) => a.id),
              ...history.map((a) => a.id),
            ]);
            for (const usedId of usedAssignmentIds) {
              const usedSeq = companionAssignmentSequence(usedId);
              if (usedSeq !== null) seq = Math.max(seq, usedSeq + 1);
            }

            for (const draft of plan.newAssignments) {
              if (active[draft.heirId]) continue;

              let id = companionAssignmentId(draft.heirId, seq);
              while (usedAssignmentIds.has(id)) {
                seq += 1;
                id = companionAssignmentId(draft.heirId, seq);
              }
              seq += 1;
              usedAssignmentIds.add(id);
              active[draft.heirId] = { ...draft, id };
            }
          ''',
          )

          replace_once(
              "src/engine/characters/companionReconciliation.ts",
              '''export function getFormerCompanions(state: GameState, heirId: string): HeirCompanionAssignment[] {
            return state.endedCompanionAssignments
              .filter((a) => a.heirId === heirId)
              .sort((a, b) => companionEndOrdinal(b) - companionEndOrdinal(a));
          }
          ''',
              '''export function getFormerCompanions(state: GameState, heirId: string): HeirCompanionAssignment[] {
            return state.endedCompanionAssignments
              .filter((a) => a.heirId === heirId)
              .sort(
                (a, b) =>
                  (b.endedAt?.dayIndex ?? b.assignedAt.dayIndex) -
                  (a.endedAt?.dayIndex ?? a.assignedAt.dayIndex),
              );
          }
          ''',
          )

          replace_once(
              "src/engine/characters/companionReconciliation.ts",
              '''
          function companionEndOrdinal(a: HeirCompanionAssignment): number {
            const t = a.endedAt ?? a.assignedAt;
            return ((t.year * 12 + t.month) * 3) + ({ early: 0, mid: 1, late: 2 } as const)[t.period] + t.dayIndex / 1000;
          }
          ''',
              '''
          ''',
          )

          # 2) history references and sequence invariant.
          replace_once(
              "src/engine/characters/companionValidator.ts",
              '''    // 历史人物**允许**已死/缺失；若来源仍存在，性别仍须与皇嗣相符（命名空间正确性的代理）。
              const heir = state.resources.bloodline.heirs.find((h) => h.id === a.heirId);
              const personSex = resolvePersonSex(state, a);
              if (heir && personSex !== null) {
                const want = expectedCompanionSex(heir.sex);
                if (personSex !== want) {
                  errors.push(stateError("COMPANION_SEX_MISMATCH", `history assignment "${a.id}" person sex="${personSex}" expected "${want}"`));
                }
              }
          ''',
              '''    // 历史人物允许已故，但人物记录与皇嗣记录必须继续存在，才能作为可追溯关系实体。
              const heir = state.resources.bloodline.heirs.find((h) => h.id === a.heirId);
              if (!heir) {
                errors.push(stateError("COMPANION_DANGLING_HEIR", `history assignment "${a.id}" references unknown heir "${a.heirId}"`));
              }

              const personId = a.companion.personId;
              const personSex = resolvePersonSex(state, a);
              if (personSex === null) {
                errors.push(stateError("COMPANION_DANGLING_PERSON", `history assignment "${a.id}" companion "${personId}" not found`));
              }

              if (heir) {
                const want = expectedCompanionSex(heir.sex);
                if (a.profile.sex !== want) {
                  errors.push(stateError("COMPANION_SEX_MISMATCH", `history assignment "${a.id}" profile.sex="${a.profile.sex}" expected "${want}"`));
                }
                if (personSex !== null && personSex !== want) {
                  errors.push(stateError("COMPANION_SEX_MISMATCH", `history assignment "${a.id}" person sex="${personSex}" expected "${want}"`));
                }
              }
          ''',
          )

          replace_once(
              "src/engine/characters/companionValidator.ts",
              '''  for (const a of allAssignments) {
              if (seenIds.has(a.id)) {
                errors.push(stateError("COMPANION_DUPLICATE_ID", `duplicate companion assignment id "${a.id}"`));
              } else {
                seenIds.add(a.id);
              }
            }

            return errors;
          }
          ''',
              '''  let maxNumericSequence = -1;
            for (const a of allAssignments) {
              if (seenIds.has(a.id)) {
                errors.push(stateError("COMPANION_DUPLICATE_ID", `duplicate companion assignment id "${a.id}"`));
              } else {
                seenIds.add(a.id);
              }
              const match = /^companion_assignment_.+_(\\d+)$/.exec(a.id);
              if (match) maxNumericSequence = Math.max(maxNumericSequence, Number(match[1]));
            }

            if (state.nextCompanionAssignmentSeq <= maxNumericSequence) {
              errors.push(
                stateError(
                  "COMPANION_SEQUENCE_NOT_AHEAD",
                  `nextCompanionAssignmentSeq=${state.nextCompanionAssignmentSeq} must be greater than existing max sequence ${maxNumericSequence}`,
                ),
              );
            }

            return errors;
          }
          ''',
          )

          # 3) migration advances sequence past numeric IDs already present in partial/dev saves.
          replace_once(
              "src/engine/save/saveSystem.ts",
              '''    // seq 至少越过已分配的 legacy 数量，避免未来 id 冲突。
              seq = Math.max(seq, Object.keys(rawCompanions).length);
          ''',
              '''    // seq 至少越过已分配数量，并扫描可能已存在的正式数字 id（兼容半迁移开发档）。
              let maxNumericSequence = -1;
              for (const assignment of [...Object.values(active), ...history]) {
                const id = assignment["id"];
                if (typeof id !== "string") continue;
                const match = /^companion_assignment_.+_(\\d+)$/.exec(id);
                if (match) maxNumericSequence = Math.max(maxNumericSequence, Number(match[1]));
              }
              seq = Math.max(seq, Object.keys(rawCompanions).length, maxNumericSequence + 1);
          ''',
          )

          # Regression tests for all three blockers.
          history_test = Path("tests/characters/companionHistory.test.ts")
          history_text = history_test.read_text()
          marker = "// ── PR review regressions: stale plan / sequence / history links ────────────────"
          if marker not in history_text:
              history_text += r'''

          // ── PR review regressions: stale plan / sequence / history links ────────────────

          describe("PR review regressions", () => {
            it("过期替补 plan 不覆盖已经存在的较新 active 关系", () => {
              const heir = makeHeir("h1", 1);
              const base = makeState([heir]);
              base.royalRelatives["r1"] = deadRoyal();
              base.heirCompanions["h1"] = activeAssignment("h1");
              base.nextCompanionAssignmentSeq = 1;
              const stalePlan = planCompanionReconciliation(db, base, NOW);

              const newer = activeAssignment("h1");
              newer.id = "companion_assignment_h1_9";
              newer.companion = { kind: "royal_relative", personId: "r2" };
              newer.profile = { ...newer.profile, name: "新任" };
              const current: GameState = {
                ...base,
                royalRelatives: {
                  ...base.royalRelatives,
                  r2: { ...deadRoyal(), id: "r2", name: "新任", lifecycle: "alive", deceasedAt: undefined },
                },
                heirCompanions: { h1: newer },
                nextCompanionAssignmentSeq: 10,
              };

              const result = applyCompanionReconciliation(current, stalePlan, NOW);
              expect(result.heirCompanions.h1).toEqual(newer);
              expect(result.endedCompanionAssignments).toHaveLength(0);
              expect(result.nextCompanionAssignmentSeq).toBe(10);
            });

            it("seq 落后时 apply 防御性跳过占用序号，active/history 仍全局唯一", () => {
              const heir = makeHeir("h1", 1);
              const s = makeState([heir]);
              s.royalRelatives.r1 = deadRoyal();
              s.heirCompanions.h1 = activeAssignment("h1");
              s.nextCompanionAssignmentSeq = 0;

              const result = reconcile(s);
              const ids = [
                ...Object.values(result.heirCompanions).map((a) => a.id),
                ...result.endedCompanionAssignments.map((a) => a.id),
              ];
              expect(new Set(ids).size).toBe(ids.length);
              expect(result.heirCompanions.h1!.id).toBe("companion_assignment_h1_1");
              expect(result.nextCompanionAssignmentSeq).toBe(2);
            });

            it("validator 拒绝落后的正式数字序列，但忽略 legacy id", () => {
              const heir = makeHeir("h1", 1);
              const bad = makeState([heir]);
              bad.royalRelatives.r1 = { ...deadRoyal(), lifecycle: "alive", deceasedAt: undefined };
              bad.heirCompanions.h1 = { ...activeAssignment("h1"), id: "companion_assignment_h1_7" };
              bad.nextCompanionAssignmentSeq = 3;
              expect(validateCompanionWorld(bad).some((e) => e.code === "COMPANION_SEQUENCE_NOT_AHEAD")).toBe(true);

              const legacy = makeState([heir]);
              legacy.royalRelatives.r1 = { ...deadRoyal(), lifecycle: "alive", deceasedAt: undefined };
              legacy.heirCompanions.h1 = { ...activeAssignment("h1"), id: "companion_assignment_legacy_h1" };
              legacy.nextCompanionAssignmentSeq = 0;
              expect(validateCompanionWorld(legacy).some((e) => e.code === "COMPANION_SEQUENCE_NOT_AHEAD")).toBe(false);
            });

            it("历史关系必须引用真实皇嗣与人物，并校验 profile 性别", () => {
              const heir = makeHeir("h1", 1);
              const base = makeState([heir]);
              base.royalRelatives.r1 = deadRoyal();
              const ended: HeirCompanionAssignment = {
                ...activeAssignment("h1"),
                status: "ended",
                endedAt: NOW,
                endReason: "companion_deceased",
              };

              const missingHeir = { ...base, endedCompanionAssignments: [{ ...ended, heirId: "ghost" }] };
              expect(validateCompanionWorld(missingHeir).some((e) => e.code === "COMPANION_DANGLING_HEIR")).toBe(true);

              const missingPerson = {
                ...base,
                endedCompanionAssignments: [{ ...ended, companion: { kind: "royal_relative" as const, personId: "ghost" } }],
              };
              expect(validateCompanionWorld(missingPerson).some((e) => e.code === "COMPANION_DANGLING_PERSON")).toBe(true);

              const wrongProfile = {
                ...base,
                endedCompanionAssignments: [{ ...ended, profile: { ...ended.profile, sex: "male" as const } }],
              };
              expect(validateCompanionWorld(wrongProfile).some((e) => e.code === "COMPANION_SEX_MISMATCH")).toBe(true);
            });

            it("历史引用仍存在的已故 family member 被接受", () => {
              const heir = makeHeir("h1", 1);
              const s = makeState([heir]);
              s.familyMembers.fm1 = {
                id: "fm1", familyId: "f1", name: "故友", surname: "林", sex: "female", age: 8,
                role: "daughter", deceasedAt: NOW,
              };
              s.endedCompanionAssignments = [{
                ...activeAssignment("h1"),
                id: "legacy_history",
                companion: { kind: "family_member", personId: "fm1" },
                profile: { ...activeAssignment("h1").profile, name: "故友" },
                status: "ended", endedAt: NOW, endReason: "companion_deceased",
              }];
              expect(validateCompanionWorld(s)).toHaveLength(0);
            });
          });
          '''
              history_test.write_text(history_text)

          migration_test = Path("tests/save/migrationV39.test.ts")
          migration_text = migration_test.read_text()
          migration_marker = "V39-05: 已有正式数字 id 时 seq 推进到最大后缀之后"
          if migration_marker not in migration_text:
              insert = r'''

            it("V39-05: 已有正式数字 id 时 seq 推进到最大后缀之后", () => {
              const storage = createMemoryStorage();
              const env = JSON.parse(makeV38Save()) as { state: Record<string, unknown>; checksum: string };
              const companions = env.state["heirCompanions"] as Record<string, Record<string, unknown>>;
              companions["heir_a"]!["id"] = "companion_assignment_heir_a_7";
              env.state["nextCompanionAssignmentSeq"] = 3;
              env.checksum = checksumOf(env.state as unknown as GameState);
              storage.set(`${SAVE_KEY_PREFIX}slot1`, JSON.stringify(env));

              const loaded = readSlot(storage, db, "slot1");
              expect(loaded.ok).toBe(true);
              if (!loaded.ok) return;
              expect(loaded.value.state.nextCompanionAssignmentSeq).toBeGreaterThanOrEqual(8);
            });
          '''
              idx = migration_text.rfind("});")
              if idx < 0:
                  raise SystemExit("migration test describe terminator not found")
              migration_text = migration_text[:idx] + insert + migration_text[idx:]
              migration_test.write_text(migration_text)
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify
        run: |
          npm ci
          npm run typecheck
          npm test

      - name: Commit fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/pr130-review-fix.yml
          printf 'applied\n' > .pr130-review-fix-applied
          git add src/engine/characters/companionReconciliation.ts \
                  src/engine/characters/companionValidator.ts \
                  src/engine/save/saveSystem.ts \
                  tests/characters/companionHistory.test.ts \
                  tests/save/migrationV39.test.ts \
                  .pr130-review-fix-applied
          git commit -m "fix: harden companion history invariants"
          git push origin HEAD:worktree-companion-history-pr4c1
