name: Apply PR 134 review fix

on:
  pull_request:
    types:
      - synchronize

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.event.pull_request.number == 134 && github.event.pull_request.head.ref == 'worktree-taihou-rebuke-gate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Patch greeting ceremony drain
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          app = Path('src/ui/App.tsx')
          text = app.read_text(encoding='utf-8')

          import_anchor = '} from "./eventReturn";\n'
          import_replacement = '} from "./eventReturn";\nimport { greetingDrainAction } from "./greetingDrain";\n'
          if text.count(import_anchor) != 1:
              raise SystemExit(f'unexpected eventReturn import anchor count: {text.count(import_anchor)}')
          text = text.replace(import_anchor, import_replacement, 1)

          enter_old = '''    setCeremonyOpen(true);
    // 懿旨等转旬反应入队，待 ceremony 关闭后随正常流程消化（此处仅记一旬动作）。
    if (decreeBeats.length) setReactionQueue((q) => [...q, ...decreeBeats]);
'''
          enter_new = '''    setCeremonyOpen(true);
    // 问安礼自身先占有本次行动的 deferred checkpoint；礼仪结束后统一 drain。
    // 即使没有懿旨/乘风台词，待处理的太后训诫也必须在礼仪结束后弹出，不能悬空阻塞全局结算。
    pendingReactionDispatch({ type: "begin", request: spend.value.rolledOver ? stationaryRequest() : null });
    if (decreeBeats.length) setReactionQueue((q) => [...q, ...decreeBeats]);
'''
          if text.count(enter_old) != 1:
              raise SystemExit(f'unexpected enterGreeting block count: {text.count(enter_old)}')
          text = text.replace(enter_old, enter_new, 1)

          done_old = '''            onDone={() => {
              setCeremonyOpen(false);
              if (reactionQueue.length > 0) {
                const [first, ...rest] = reactionQueue;
                setReaction(first!);
                setReactionQueue(rest);
              }
            }}
'''
          done_new = '''            onDone={() => {
              setCeremonyOpen(false);
              if (greetingDrainAction(reactionQueue.length) === "play_queue") {
                const [first, ...rest] = reactionQueue;
                setReaction(first!);
                setReactionQueue(rest);
                return;
              }
              // 无排队反应也必须收口：若本行动命中太后训诫，此处显示乘风询问；否则完成 checkpoint。
              flushPendingReactionCheckpoint();
            }}
'''
          if text.count(done_old) != 1:
              raise SystemExit(f'unexpected GreetingCeremonyOverlay onDone block count: {text.count(done_old)}')
          text = text.replace(done_old, done_new, 1)
          app.write_text(text, encoding='utf-8')
          PY

          cat > src/ui/greetingDrain.ts <<'EOF'
          /** 问安礼结束后的统一收口决策。 */
          export type GreetingDrainAction = "play_queue" | "flush";

          /**
           * 有排队反应时先播放；没有时也必须 flush，让待处理的太后训诫 prompt 或 deferred checkpoint 继续。
           */
          export function greetingDrainAction(reactionQueueLength: number): GreetingDrainAction {
            return reactionQueueLength > 0 ? "play_queue" : "flush";
          }
          EOF

          cat > tests/ui/greetingDrain.test.ts <<'EOF'
          import { describe, expect, it } from "vitest";
          import { greetingDrainAction } from "../../src/ui/greetingDrain";

          describe("问安礼结束后的收口", () => {
            it("有排队反应时先播放队列", () => {
              expect(greetingDrainAction(2)).toBe("play_queue");
            });

            it("无排队反应时仍执行 flush，使太后训诫 prompt/checkpoint 不悬空", () => {
              expect(greetingDrainAction(0)).toBe("flush");
            });
          });
          EOF

      - name: Verify targeted regression
        run: |
          npm ci
          npx vitest run tests/ui/greetingDrain.test.ts tests/store/taihouRebukeFlow.test.ts tests/store/presentedScene.test.ts

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ui/App.tsx src/ui/greetingDrain.ts tests/ui/greetingDrain.test.ts
          git commit -m "fix: drain pending rebuke after greeting ceremony"
          git push origin HEAD:worktree-taihou-rebuke-gate
